<script>
/* ── Mouth path data (replaces morphSVG) ───────────────────── */
var MOUTH = {
  small:
    "M100,107c-3.8,0-7-1.3-8.5-2.8c-.5-.5-.4-1.1.2-1.5" +
    "c.3-.2.7-.2,1,0c2.2,1.4,5,2.1,7.3,2.1" +
    "s5.1-.7,7.3-2.1c.3-.2.7-.2,1,0" +
    "c.6.4.7,1,.2,1.5C107,105.7,103.8,107,100,107z",
  medium:
    "M95,110c-4.5,0-8-3.5-8-8v-2c0-1.1,1-2,2-2h22" +
    "c1.1,0,2,.9,2,2v2c0,4.5-3.5,8-8,8H95z",
  large:
    "M100,116c-9,0-16-7.2-16-16c0-2.2,1.8-4,4-4h24" +
    "c2.2,0,4,1.8,4,4C116,108.8,109,116,100,116z"
};

/* ── DOM references ─────────────────────────────────────────── */
var emailLabel        = document.querySelector('#loginEmailLabel'),
    email             = document.querySelector('#loginEmail'),
    password          = document.querySelector('#loginPassword'),
    showPasswordCheck = document.querySelector('#showPasswordCheck'),
    showPasswordToggle= document.querySelector('#showPasswordToggle'),
    mySVG             = document.querySelector('.svgContainer'),
    twoFingers        = document.querySelector('.twoFingers'),
    armL              = document.querySelector('.armL'),
    armR              = document.querySelector('.armR'),
    eyeL              = document.querySelector('.eyeL'),
    eyeR              = document.querySelector('.eyeR'),
    nose              = document.querySelector('.nose'),
    mouth             = document.querySelector('.mouth'),
    mouthBG           = document.querySelector('.mouthBG'),
    mouthSmallBG      = document.querySelector('.mouthSmallBG'),
    mouthMediumBG     = document.querySelector('.mouthMediumBG'),
    mouthLargeBG      = document.querySelector('.mouthLargeBG'),
    mouthMaskPath     = document.querySelector('#mouthMaskPath'),
    mouthOutline      = document.querySelector('.mouthOutline'),
    tongue            = document.querySelector('.tongue'),
    chin              = document.querySelector('.chin'),
    face              = document.querySelector('.face'),
    eyebrow           = document.querySelector('.eyebrow'),
    outerEarL         = document.querySelector('.earL .outerEar'),
    outerEarR         = document.querySelector('.earR .outerEar'),
    earHairL          = document.querySelector('.earL .earHair'),
    earHairR          = document.querySelector('.earR .earHair'),
    hair              = document.querySelector('.hair'),
    bodyBG            = document.querySelector('.bodyBGnormal'),
    bodyBGchanged     = document.querySelector('.bodyBGchanged');

/* ── State variables ────────────────────────────────────────── */
var activeElement, curEmailIndex, screenCenter,
    svgCoords, emailCoords, emailScrollMax,
    chinMin = .5, dFromC,
    mouthStatus = 'small', blinking,
    eyeScale = 1, eyesCovered = false, showPasswordClicked = false,
    eyeLCoords, eyeRCoords, noseCoords, mouthCoords,
    eyeLAngle, eyeLX, eyeLY, eyeRAngle, eyeRX, eyeRY,
    noseAngle, noseX, noseY, mouthAngle, mouthX, mouthY, mouthR,
    chinX, chinY, chinS, faceX, faceY, faceSkew, eyebrowSkew,
    outerEarX, outerEarY, hairX, hairS;

/* ── Mouth state switcher (no morphSVG needed) ──────────────── */
function applyMouthState(state) {
  mouthBG.style.display       = state === 'small'  ? 'block' : 'none';
  mouthMediumBG.style.display = state === 'medium' ? 'block' : 'none';
  mouthLargeBG.style.display  = state === 'large'  ? 'block' : 'none';
  mouthOutline.style.display  = state === 'small'  ? 'block' : 'none';
  mouthMaskPath.setAttribute('d', MOUTH[state]);
}

/* ── Face tracking ──────────────────────────────────────────── */
function calculateFaceMove() {
  var carPos = email.selectionEnd || email.value.length,
      div    = document.createElement('div'),
      span   = document.createElement('span'),
      cs     = getComputedStyle(email),
      caretCoords;

  [].forEach.call(cs, function(p){ div.style[p] = cs[p]; });
  div.style.position = 'absolute';
  div.style.visibility = 'hidden';
  document.body.appendChild(div);
  div.textContent  = email.value.substr(0, carPos);
  span.textContent = email.value.substr(carPos) || '.';
  div.appendChild(span);

  // Calcola la posizione X del cursore sullo schermo (posizione assoluta dello span)
  var target = getPosition(span).x;

  if (email.scrollWidth <= emailScrollMax) {
    dFromC = screenCenter - target;
  }

  // Mappatura corretta per guardare il testo: Target (testo) prima dei punti del viso
  eyeLAngle  = getAngle(target, emailCoords.y + 25, eyeLCoords.x,  eyeLCoords.y);
  eyeRAngle  = getAngle(target, emailCoords.y + 25, eyeRCoords.x,  eyeRCoords.y);
  noseAngle  = getAngle(target, emailCoords.y + 25, noseCoords.x,  noseCoords.y);
  mouthAngle = getAngle(target, emailCoords.y + 25, mouthCoords.x, mouthCoords.y);

  // Moltiplicatori positivi per assecondare la direzione reale del testo
  // Valori calibrati (8, 4, 10...) per mantenere i movimenti fluidi e dentro l'SVG
  eyeLX = Math.cos(eyeLAngle)*8;    eyeLY = Math.sin(eyeLAngle)*4;
  noseX = Math.cos(noseAngle)*10;   noseY = Math.sin(noseAngle)*5;
  mouthX= Math.cos(mouthAngle)*10;  mouthY= Math.sin(mouthAngle)*5;
  mouthR= Math.cos(mouthAngle)*4;
  chinX = mouthX*.8; chinY = mouthY*.5;
  
  chinS = 1 - ((dFromC*.15)/100);
  if (chinS > 1) { chinS = 1-(chinS-1); if (chinS < chinMin) chinS = chinMin; }
  
  faceX = mouthX*.4; faceY = mouthY*.4;
  faceSkew    = Math.cos(mouthAngle)*3;
  eyebrowSkew = Math.cos(mouthAngle)*5;
  outerEarX   = Math.cos(mouthAngle)*3;
  outerEarY   = Math.sin(mouthAngle)*2;
  hairX = Math.cos(mouthAngle)*4;
  hairS = 1.15;

  // Applichiamo i movimenti in positivo (senza il meno davanti alle variabili)
  TweenMax.to(eyeL,  1, {x:eyeLX,  y:eyeLY,  ease:Expo.easeOut});
  TweenMax.to(eyeR,  1, {x:eyeLX,  y:eyeLY,  ease:Expo.easeOut}); // Occhi paralleli per evitare strabismo
  TweenMax.to(nose,  1, {x:noseX,  y:noseY,  rotation:mouthR, transformOrigin:"center center", ease:Expo.easeOut});
  TweenMax.to(mouth, 1, {x:mouthX, y:mouthY, rotation:mouthR, transformOrigin:"center center", ease:Expo.easeOut});
  TweenMax.to(chin,  1, {x:chinX,  y:chinY,  scaleY:chinS, ease:Expo.easeOut});
  TweenMax.to(face,     1, {x:faceX, y:faceY, skewX:faceSkew,     transformOrigin:"center top", ease:Expo.easeOut});
  TweenMax.to(eyebrow,  1, {x:faceX, y:faceY, skewX:eyebrowSkew,  transformOrigin:"center top", ease:Expo.easeOut});
  
  // Effetto parallasse delle orecchie: se il viso va a sinistra, l'orecchio visibile si sposta verso l'interno
  TweenMax.to(outerEarL,1, {x:-outerEarX, y:outerEarY, ease:Expo.easeOut});
  TweenMax.to(outerEarR,1, {x:-outerEarX, y:-outerEarY, ease:Expo.easeOut});
  TweenMax.to(earHairL, 1, {x: outerEarX, y:outerEarY, ease:Expo.easeOut});
  TweenMax.to(earHairR, 1, {x: outerEarX, y:-outerEarY, ease:Expo.easeOut});
  TweenMax.to(hair, 1, {x:hairX, scaleY:hairS, transformOrigin:"center bottom", ease:Expo.easeOut});

  document.body.removeChild(div);
}

/* ── Email events ───────────────────────────────────────────── */
function onEmailInput() {
  calculateFaceMove();
  var val = email.value;
  curEmailIndex = val.length;

  if (curEmailIndex > 0) {
    if (val.includes('@')) {
      if (mouthStatus !== 'large') {
        mouthStatus = 'large';
        applyMouthState('large');
        TweenMax.to(tongue, 1, {y:2,       ease:Expo.easeOut});
        TweenMax.to([eyeL,eyeR], 1, {scaleX:.65, scaleY:.65, transformOrigin:"center center", ease:Expo.easeOut});
        eyeScale = .65;
      }
    } else {
      if (mouthStatus !== 'medium') {
        mouthStatus = 'medium';
        applyMouthState('medium');
        TweenMax.to(tongue, 1, {x:0, y:1, ease:Expo.easeOut});
        TweenMax.to([eyeL,eyeR], 1, {scaleX:.85, scaleY:.85, ease:Expo.easeOut});
        eyeScale = .85;
      }
    }
  } else {
    if (mouthStatus !== 'small') {
      mouthStatus = 'small';
      applyMouthState('small');
      TweenMax.to(tongue, 1, {y:0,       ease:Expo.easeOut});
      TweenMax.to([eyeL,eyeR], 1, {scaleX:1, scaleY:1, ease:Expo.easeOut});
      eyeScale = 1;
    }
  }
}

function onEmailFocus(e) {
  activeElement = 'email';
  e.target.parentElement.classList.add('focusWithText');
  // Posiziona il cursore all'inizio e fa guardare l'omino a sinistra
  e.target.setSelectionRange(0, 0);
  calculateFaceMove();
}
function onEmailBlur(e) {
  activeElement = null;
  setTimeout(function(){
    if (activeElement === 'email') return;
    if (e.target.value === '') e.target.parentElement.classList.remove('focusWithText');
    if (mouthStatus !== 'small') {
      mouthStatus = 'small';
      applyMouthState('small');
      TweenMax.to(tongue, 1, {y:0, ease:Expo.easeOut});
      TweenMax.to([eyeL,eyeR], 1, {scaleX:1, scaleY:1, ease:Expo.easeOut});
      eyeScale = 1;
    }
    resetFace();
  }, 100);
}
function onEmailLabelClick() { activeElement = 'email'; }

/* ── Password events ────────────────────────────────────────── */
function onPasswordFocus() {
  activeElement = 'password';
  if (!eyesCovered) coverEyes();
}
function onPasswordBlur() {
  activeElement = null;
  setTimeout(function(){
    if (activeElement === 'toggle' || activeElement === 'password') return;
    uncoverEyes();
  }, 100);
}
function onPasswordToggleFocus() {
  activeElement = 'toggle';
  if (!eyesCovered) coverEyes();
}
function onPasswordToggleBlur() {
  activeElement = null;
  if (!showPasswordClicked) {
    setTimeout(function(){
      if (activeElement === 'password' || activeElement === 'toggle') return;
      uncoverEyes();
    }, 100);
  }
}
function onPasswordToggleMouseDown() { showPasswordClicked = true; }
function onPasswordToggleMouseUp()   { showPasswordClicked = false; }
function onPasswordToggleChange(e) {
  setTimeout(function(){
    if (e.target.checked) { password.type = 'text';     spreadFingers(); }
    else                  { password.type = 'password'; closeFingers();  }
  }, 100);
}
function onPasswordToggleClick(e) { e.target.focus(); }

/* ── Finger spread / close ──────────────────────────────────── */
function spreadFingers() {
  TweenMax.to(twoFingers, .35, {transformOrigin:"bottom left", rotation:30, x:-9, y:-2, ease:Power2.easeInOut});
}
function closeFingers() {
  TweenMax.to(twoFingers, .35, {transformOrigin:"bottom left", rotation:0,  x:0,  y:0,  ease:Power2.easeInOut});
}

/* ── Cover / uncover eyes ───────────────────────────────────── */
function coverEyes() {
  TweenMax.killTweensOf([armL, armR]);
  TweenMax.set([armL, armR], {visibility:'visible'});
  TweenMax.to(armL, .45, {x:-93, y:10, rotation:0, ease:Quad.easeOut});
  TweenMax.to(armR, .45, {x:-93, y:10, rotation:0, ease:Quad.easeOut, delay:.1});
  bodyBG.style.display        = 'none';
  bodyBGchanged.style.display = 'block';
  eyesCovered = true;
}
function uncoverEyes() {
  TweenMax.killTweensOf([armL, armR]);
  TweenMax.to(armL, 1.35, {y:220, ease:Quad.easeOut});
  TweenMax.to(armL, 1.35, {rotation: 105, ease:Quad.easeOut, delay:.1});
  TweenMax.to(armR, 1.35, {y:220, ease:Quad.easeOut});
  TweenMax.to(armR, 1.35, {rotation:-105, ease:Quad.easeOut, delay:.1, onComplete:function(){
    TweenMax.set([armL, armR], {visibility:'hidden'});
  }});
  bodyBG.style.display        = 'block';
  bodyBGchanged.style.display = 'none';
  eyesCovered = false;
}

/* ── Reset face ─────────────────────────────────────────────── */
function resetFace() {
  TweenMax.to([eyeL,eyeR], 1, {x:0, y:0, ease:Expo.easeOut});
  TweenMax.to(nose,  1, {x:0, y:0, scaleX:1, scaleY:1, ease:Expo.easeOut});
  TweenMax.to(mouth, 1, {x:0, y:0, rotation:0, ease:Expo.easeOut});
  TweenMax.to(chin,  1, {x:0, y:0, scaleY:1,  ease:Expo.easeOut});
  TweenMax.to([face, eyebrow], 1, {x:0, y:0, skewX:0, ease:Expo.easeOut});
  TweenMax.to([outerEarL,outerEarR,earHairL,earHairR,hair], 1, {x:0, y:0, scaleY:1, ease:Expo.easeOut});
}

/* ── Blinking ───────────────────────────────────────────────── */
function startBlinking(delay) {
  var d = delay ? Math.floor(Math.random()*delay) : 1;
  blinking = TweenMax.to([eyeL,eyeR], .1, {
    delay: d, scaleY:0, yoyo:true, repeat:1,
    transformOrigin:"center center",
    onComplete: function(){ startBlinking(12); }
  });
}
function stopBlinking() {
  blinking.kill(); blinking = null;
  TweenMax.set([eyeL,eyeR], {scaleY:eyeScale});
}

/* ── Utilities ──────────────────────────────────────────────── */
function getAngle(x1,y1,x2,y2){ return Math.atan2(y1-y2, x1-x2); }

function getPosition(el) {
  var x=0, y=0;
  while (el) {
    if (el.tagName === 'BODY') {
      x += el.offsetLeft - (el.scrollLeft||document.documentElement.scrollLeft) + el.clientLeft;
      y += el.offsetTop  - (el.scrollTop ||document.documentElement.scrollTop)  + el.clientTop;
    } else {
      x += el.offsetLeft - el.scrollLeft + el.clientLeft;
      y += el.offsetTop  - el.scrollTop  + el.clientTop;
    }
    el = el.offsetParent;
  }
  return {x:x, y:y};
}

/* ── Init ───────────────────────────────────────────────────── */
function initLoginForm() {
  svgCoords    = getPosition(mySVG);
  emailCoords  = getPosition(email);
  screenCenter = svgCoords.x + (mySVG.offsetWidth / 2);

  /* adjusted coordinates for footballer face */
  eyeLCoords  = {x: svgCoords.x + 87,  y: svgCoords.y + 84};
  eyeRCoords  = {x: svgCoords.x + 113, y: svgCoords.y + 84};
  noseCoords  = {x: svgCoords.x + 100, y: svgCoords.y + 94};
  mouthCoords = {x: svgCoords.x + 100, y: svgCoords.y + 107};

  email.addEventListener('focus', onEmailFocus);
  email.addEventListener('blur',  onEmailBlur);
  email.addEventListener('input', onEmailInput);
  email.addEventListener('click', function() { calculateFaceMove(); }); // Traccia quando clicchi dentro il campo
  emailLabel.addEventListener('click', onEmailLabelClick);

  password.addEventListener('focus', onPasswordFocus);
  password.addEventListener('blur',  onPasswordBlur);

  showPasswordCheck.addEventListener('change',     onPasswordToggleChange);
  showPasswordCheck.addEventListener('focus',      onPasswordToggleFocus);
  showPasswordCheck.addEventListener('blur',       onPasswordToggleBlur);
  showPasswordCheck.addEventListener('click',      onPasswordToggleClick);
  showPasswordToggle.addEventListener('mouseup',   onPasswordToggleMouseUp);
  showPasswordToggle.addEventListener('mousedown', onPasswordToggleMouseDown);

  TweenMax.set(armL,  {x:-93, y:220, rotation: 105, transformOrigin:"top left"});
  TweenMax.set(armR,  {x:-93, y:220, rotation:-105, transformOrigin:"top right"});
  TweenMax.set(mouth, {transformOrigin:"center center"});

  startBlinking(5);
  emailScrollMax = email.scrollWidth;

  if (isMobileDevice()) {
    password.type = 'text';
    showPasswordCheck.checked = true;
    TweenMax.set(twoFingers, {transformOrigin:"bottom left", rotation:30, x:-9, y:-2});
  }

  console.clear();
}
initLoginForm();
</script>
